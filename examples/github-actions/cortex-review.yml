# .github/workflows/cortex-review.yml
# Automated code review with Cortex AI agents
# Add this file to your project's .github/workflows/ directory

name: Cortex Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  cortex-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Cortex
        run: |
          git clone https://github.com/nacho995/cortex.git /tmp/cortex
          cd /tmp/cortex
          bash install.sh
          echo "$HOME/.cortex" >> $GITHUB_PATH

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(java|py|js|ts|jsx|tsx)$' | head -5)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Cortex Review
        if: steps.changed.outputs.files != ''
        env:
          CORTEX_TOKEN: ${{ secrets.CORTEX_TOKEN }}
        run: |
          cortex init .
          for file in ${{ steps.changed.outputs.files }}; do
            echo "## Reviewing: $file"
            cortex review -p . "$file" 2>&1 || true
            echo "---"
          done > review_output.txt

      - name: Post Review Comment
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('review_output.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🧠 Cortex AI Code Review\n\n\`\`\`\n${output.substring(0, 60000)}\n\`\`\``
            });
